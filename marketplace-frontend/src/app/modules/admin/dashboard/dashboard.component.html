<div class="app-header">
  <h1>Admin Dashboard</h1>
</div>

<div class="app-content">
  <div *ngIf="loading" class="empty-state">Loading...</div>

  <div *ngIf="!loading && stats">
    <div class="grid grid-cols-4">
      <app-stat-card label="Total Users" [value]="stats.users_total"></app-stat-card>
      <app-stat-card label="Approved Vendors" [value]="stats.vendors_approved"
        [meta]="stats.vendors_pending + ' pending'"></app-stat-card>
      <app-stat-card label="Products" [value]="stats.products_total"
        [meta]="stats.products_active + ' active'"></app-stat-card>
      <app-stat-card label="Total Orders" [value]="stats.orders_total"
        [meta]="stats.orders_pending + ' pending'"></app-stat-card>
    </div>

    <div class="card mt-lg">
      <div class="card-header"><h3>Gross Sales (paid)</h3></div>
      <div class="stat-value">${{ stats.gross_sales | number: '1.2-2' }}</div>
    </div>

    <div class="card mt-lg">
      <h3>Quick Actions</h3>
      <div class="flex gap-md">
        <a routerLink="/admin/vendor-approvals" class="btn btn-primary">
          Review Vendors ({{ stats.vendors_pending }})
        </a>
        <a routerLink="/admin/orders" class="btn btn-secondary">All Orders</a>
        <a routerLink="/admin/users" class="btn btn-secondary">Users</a>
      </div>
    </div>
  </div>
</div>
