<div class="app-header">
  <h1>Categories</h1>
</div>

<div class="app-content">
  <div class="page-header">
    <span class="text-muted">{{ categories.length }} total</span>
    <button type="button" class="btn btn-primary" (click)="openCreate()">+ New Category</button>
  </div>

  <div *ngIf="loading" class="empty-state">Loading...</div>

  <div class="table-wrapper" *ngIf="!loading && categories.length > 0">
    <table class="data-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Slug</th>
          <th>Active</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of categories">
          <td><strong>{{ c.name }}</strong></td>
          <td>{{ c.slug }}</td>
          <td>
            <span *ngIf="c.is_active" class="status-badge status-active">Active</span>
            <span *ngIf="!c.is_active" class="status-badge status-inactive">Inactive</span>
          </td>
          <td class="text-right">
            <button type="button" class="btn btn-ghost btn-sm" (click)="openEdit(c)">Edit</button>
            <button type="button" class="btn btn-ghost btn-sm text-danger" (click)="delete(c)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div *ngIf="showModal" class="modal-overlay" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <h3>{{ editing ? 'Edit' : 'New' }} Category</h3>
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="form-group">
        <label>Name</label>
        <input type="text" formControlName="name" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Parent Category</label>
          <select formControlName="parent_id">
            <option [ngValue]="null">-- None --</option>
            <option *ngFor="let c of categories" [ngValue]="c.id" [disabled]="editing?.id === c.id">{{ c.name }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Sort Order</label>
          <input type="number" formControlName="sort_order" />
        </div>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" formControlName="is_active" /> Active
        </label>
      </div>
      <div class="flex gap-md">
        <button type="submit" class="btn btn-primary" [disabled]="saving || form.invalid">
          {{ saving ? 'Saving...' : 'Save' }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>
