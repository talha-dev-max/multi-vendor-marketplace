<div class="app-header">
  <h1>All Orders</h1>
</div>

<div class="app-content">
  <div *ngIf="loading" class="empty-state">Loading...</div>

  <div class="table-wrapper" *ngIf="!loading && orders.length > 0">
    <table class="data-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Customer</th>
          <th>Total</th>
          <th>Status</th>
          <th>Payment</th>
          <th>Placed</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let o of orders">
          <td>#{{ o.id }}</td>
          <td>User #{{ o.customer_id }}</td>
          <td>${{ o.total | number: '1.2-2' }}</td>
          <td><span class="status-badge" [ngClass]="'status-' + o.status">{{ o.status }}</span></td>
          <td>{{ o.payment_method | uppercase }} / <span class="status-badge" [ngClass]="'status-' + o.payment_status">{{ o.payment_status }}</span></td>
          <td>{{ o.placed_at | date: 'mediumDate' }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <app-pagination
    [currentPage]="meta.current_page"
    [lastPage]="meta.last_page"
    (pageChange)="load($event)"
  ></app-pagination>
</div>
