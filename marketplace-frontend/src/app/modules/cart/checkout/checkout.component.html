<div class="page-container">
  <div class="page-header"><h1>Checkout</h1></div>

  <div *ngIf="loading" class="empty-state">Loading...</div>

  <div *ngIf="!loading && cart" class="grid grid-cols-2 gap-lg">
    <div>
      <div *ngIf="error" class="alert alert-error">{{ error }}</div>

      <form [formGroup]="form" (ngSubmit)="placeOrder()">
        <div class="card mb-lg">
          <h3>Shipping Address</h3>
          <div formGroupName="shipping_address">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" formControlName="full_name" />
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" formControlName="phone" />
            </div>
            <div class="form-group">
              <label>Address Line 1</label>
              <input type="text" formControlName="address_line1" />
            </div>
            <div class="form-group">
              <label>Address Line 2 (optional)</label>
              <input type="text" formControlName="address_line2" />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>City</label>
                <input type="text" formControlName="city" />
              </div>
              <div class="form-group">
                <label>State</label>
                <input type="text" formControlName="state" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Postal Code</label>
                <input type="text" formControlName="postal_code" />
              </div>
              <div class="form-group">
                <label>Country (2-letter)</label>
                <input type="text" formControlName="country" maxlength="2" />
              </div>
            </div>
          </div>
        </div>

        <div class="card mb-lg">
          <h3>Payment Method</h3>
          <div class="form-group">
            <label>
              <input type="radio" formControlName="payment_method" value="cod" /> Cash on Delivery
            </label>
          </div>
          <div class="form-group">
            <label>
              <input type="radio" formControlName="payment_method" value="stripe" /> Stripe (Credit Card)
            </label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block" [disabled]="placing || form.invalid">
          {{ placing ? 'Placing order...' : 'Place Order' }}
        </button>
      </form>
    </div>

    <div>
      <div class="card">
        <div class="card-header"><h3>Order Summary</h3></div>
        <div class="mb-sm" *ngFor="let item of cart.items">
          <div class="flex justify-between">
            <span>{{ item.product.name }} × {{ item.quantity }}</span>
            <span>${{ item.line_total | number: '1.2-2' }}</span>
          </div>
          <div class="text-muted" style="font-size: 12px;">{{ item.product.vendor.store_name }}</div>
        </div>
        <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 16px 0;" />
        <div class="flex justify-between">
          <strong>Total</strong>
          <strong>${{ cart.total | number: '1.2-2' }}</strong>
        </div>
      </div>
    </div>
  </div>
</div>
