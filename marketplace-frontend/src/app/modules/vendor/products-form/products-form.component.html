<div class="app-header">
  <h1>{{ editingId ? 'Edit Product' : 'New Product' }}</h1>
</div>

<div class="app-content">
  <div class="card" style="max-width: 800px;">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Name</label>
        <input type="text" formControlName="name" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea formControlName="description" rows="4"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select formControlName="category_id">
            <option [ngValue]="null">-- None --</option>
            <option *ngFor="let c of categories" [ngValue]="c.id">{{ c.name }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select formControlName="status">
            <option value="draft">Draft</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price</label>
          <input type="number" step="0.01" min="0" formControlName="price" />
        </div>
        <div class="form-group">
          <label>Stock</label>
          <input type="number" min="0" formControlName="stock" />
        </div>
      </div>

      <div class="flex gap-md">
        <button type="submit" class="btn btn-primary" [disabled]="loading || form.invalid">
          {{ loading ? 'Saving...' : 'Save Product' }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="goBack()">Back</button>
      </div>
    </form>

    <div *ngIf="editingId" class="mt-xl">
      <h3>Upload Image</h3>
      <p class="text-muted">Max 6 images per product. JPG/PNG/WEBP, up to 5 MB each.</p>
      <input type="file" accept="image/jpeg,image/png,image/webp" (change)="onFileSelected($event)" [disabled]="uploadingImage" />
    </div>
  </div>
</div>
