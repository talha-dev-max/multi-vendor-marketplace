<div class="app-header">
  <h1>My Products</h1>
</div>

<div class="app-content">
  <div class="page-header">
    <span class="text-muted">{{ meta.total }} total</span>
    <a routerLink="/vendor/products/new" class="btn btn-primary">+ New Product</a>
  </div>

  <div *ngIf="loading" class="empty-state">Loading...</div>

  <div *ngIf="!loading && products.length === 0" class="empty-state">
    <h3>No products yet</h3>
    <a routerLink="/vendor/products/new" class="btn btn-primary">Create your first product</a>
  </div>

  <div class="table-wrapper" *ngIf="!loading && products.length > 0">
    <table class="data-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of products">
          <td>
            <strong>{{ p.name }}</strong>
            <div class="text-muted" style="font-size: 12px;">{{ p.slug }}</div>
          </td>
          <td>${{ p.price | number: '1.2-2' }}</td>
          <td>{{ p.stock }}</td>
          <td><span class="status-badge" [ngClass]="'status-' + p.status">{{ p.status }}</span></td>
          <td class="text-right">
            <a [routerLink]="['/vendor/products', p.id, 'edit']" class="btn btn-ghost btn-sm">Edit</a>
            <button type="button" class="btn btn-ghost btn-sm text-danger" (click)="delete(p.id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <app-pagination
    [currentPage]="meta.current_page"
    [lastPage]="meta.last_page"
    (pageChange)="load($event)"
  ></app-pagination>
</div>
