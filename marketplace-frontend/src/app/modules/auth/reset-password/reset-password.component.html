<div class="guest-layout">
  <div class="guest-card">
    <h1 class="guest-title">Reset Password</h1>

    <div *ngIf="success" class="alert alert-success">{{ success }}</div>
    <div *ngIf="error" class="alert alert-error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" />
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" formControlName="password" />
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" formControlName="password_confirmation" />
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading || form.invalid">
        {{ loading ? 'Resetting...' : 'Reset Password' }}
      </button>
    </form>

    <p class="text-center mt-lg text-muted">
      <a routerLink="/auth/login">Back to sign in</a>
    </p>
  </div>
</div>
