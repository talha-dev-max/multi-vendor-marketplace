<div class="guest-layout">
  <div class="guest-card">
    <h1 class="guest-title">Sign In</h1>

    <div *ngIf="error" class="alert alert-error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" autofocus />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" />
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading || form.invalid">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="text-center mt-md text-muted">
      <a routerLink="/auth/forgot-password">Forgot password?</a>
    </p>
    <p class="text-center mt-sm text-muted">
      No account? <a routerLink="/auth/register">Create one</a>
    </p>
  </div>
</div>
