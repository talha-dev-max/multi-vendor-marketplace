<div class="page-container" *ngIf="product">
  <div class="grid grid-cols-2 gap-lg">
    <div>
      <div class="card" style="padding: 0; overflow: hidden;">
        <div class="product-image" style="aspect-ratio: 1;">
          <img *ngIf="selectedImage; else noImg" [src]="selectedImage" [alt]="product.name" />
          <ng-template #noImg><span class="no-image">No image</span></ng-template>
        </div>
      </div>
      <div class="flex gap-sm mt-md" *ngIf="product.images && product.images.length > 1">
        <div
          *ngFor="let img of product.images"
          class="card"
          style="padding: 0; width: 72px; height: 72px; cursor: pointer;"
          (click)="selectImage(img.path, img.url)"
        >
          <img [src]="resolveImageUrl(img.path, img.url)" [alt]="product.name" style="width: 100%; height: 100%; object-fit: cover;" />
        </div>
      </div>
    </div>

    <div>
      <h1>{{ product.name }}</h1>
      <p class="text-muted" *ngIf="product.vendor">Sold by <strong>{{ product.vendor.store_name }}</strong></p>
      <div class="product-price" style="font-size: 32px; margin: 16px 0;">${{ product.price | number: '1.2-2' }}</div>

      <p>{{ product.description }}</p>

      <div class="mt-lg">
        <strong>Stock:</strong>
        <span *ngIf="product.stock > 0" class="text-success">{{ product.stock }} available</span>
        <span *ngIf="product.stock === 0" class="text-danger">Out of stock</span>
      </div>

      <div class="form-row mt-lg">
        <div class="form-group" style="max-width: 120px;">
          <label>Quantity</label>
          <input type="number" min="1" [max]="product.stock" [(ngModel)]="quantity" />
        </div>
      </div>

      <button
        type="button"
        class="btn btn-primary btn-lg"
        [disabled]="addingToCart || product.stock === 0"
        (click)="addToCart()"
      >
        {{ addingToCart ? 'Adding...' : 'Add to Cart' }}
      </button>
    </div>
  </div>
</div>
