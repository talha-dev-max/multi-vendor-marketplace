<div class="page-container">
  <div class="page-header">
    <h1>Shop Products</h1>
    <span class="text-muted">{{ meta.total }} result(s)</span>
  </div>

  <div class="card mb-lg">
    <div class="form-row">
      <div class="form-group">
        <label>Search</label>
        <input type="text" [(ngModel)]="filters.q" placeholder="Product name..." />
      </div>
      <div class="form-group">
        <label>Category</label>
        <select [(ngModel)]="filters.category_id">
          <option [ngValue]="null">All</option>
          <option *ngFor="let c of categories" [ngValue]="c.id">{{ c.name }}</option>
        </select>
      </div>
      <div class="form-group">
        <label>Min Price</label>
        <input type="number" min="0" [(ngModel)]="filters.price_min" />
      </div>
      <div class="form-group">
        <label>Max Price</label>
        <input type="number" min="0" [(ngModel)]="filters.price_max" />
      </div>
      <div class="form-group">
        <label>Sort</label>
        <select [(ngModel)]="filters.sort">
          <option value="newest">Newest</option>
          <option value="price_asc">Price: Low to High</option>
          <option value="price_desc">Price: High to Low</option>
          <option value="name">Name</option>
        </select>
      </div>
    </div>
    <div class="flex gap-md">
      <button type="button" class="btn btn-primary" (click)="applyFilters()">Apply</button>
      <button type="button" class="btn btn-secondary" (click)="resetFilters()">Reset</button>
    </div>
  </div>

  <div *ngIf="loading" class="empty-state">Loading...</div>

  <div *ngIf="!loading && products.length === 0" class="empty-state">
    <h3>No products found</h3>
    <p class="text-muted">Try adjusting your filters.</p>
  </div>

  <div class="grid grid-cols-4" *ngIf="!loading && products.length > 0">
    <app-product-card *ngFor="let p of products" [product]="p"></app-product-card>
  </div>

  <app-pagination
    [currentPage]="meta.current_page"
    [lastPage]="meta.last_page"
    (pageChange)="goToPage($event)"
  ></app-pagination>
</div>
