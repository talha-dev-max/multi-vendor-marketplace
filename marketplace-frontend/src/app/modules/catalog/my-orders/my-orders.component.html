<div class="page-container">
  <div class="page-header"><h1>My Orders</h1></div>

  <div *ngIf="loading" class="empty-state">Loading...</div>

  <div *ngIf="!loading && orders.length === 0" class="empty-state">
    <h3>No orders yet</h3>
    <p class="text-muted">When you place an order, it will appear here.</p>
    <a routerLink="/" class="btn btn-primary">Start shopping</a>
  </div>

  <div class="table-wrapper" *ngIf="!loading && orders.length > 0">
    <table class="data-table">
      <thead>
        <tr>
          <th>Order #</th>
          <th>Date</th>
          <th>Total</th>
          <th>Status</th>
          <th>Payment</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let o of orders">
          <td>#{{ o.id }}</td>
          <td>{{ o.placed_at | date: 'mediumDate' }}</td>
          <td>${{ o.total | number: '1.2-2' }}</td>
          <td><span class="status-badge" [ngClass]="'status-' + o.status">{{ o.status }}</span></td>
          <td>
            {{ o.payment_method | uppercase }}
            <span class="status-badge" [ngClass]="'status-' + o.payment_status">{{ o.payment_status }}</span>
          </td>
          <td class="text-right">
            <a [routerLink]="['/my/orders', o.id]" class="btn btn-ghost btn-sm">View</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <app-pagination
    [currentPage]="meta.current_page"
    [lastPage]="meta.last_page"
    (pageChange)="load($event)"
  ></app-pagination>
</div>
