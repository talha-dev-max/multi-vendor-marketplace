<div class="page-container">
  <div class="page-header"><h1>Become a Vendor</h1></div>

  <div class="card" style="max-width: 600px;">
    <p class="text-muted">
      Apply to sell on the marketplace. Your application will be reviewed by an admin before you can list products.
    </p>

    <div *ngIf="success" class="alert alert-success">{{ success }}</div>
    <div *ngIf="error" class="alert alert-error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Store Name</label>
        <input type="text" formControlName="store_name" />
      </div>
      <div class="form-group">
        <label>Store Description</label>
        <textarea formControlName="description" rows="4" placeholder="Tell shoppers about your store..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary" [disabled]="loading || form.invalid">
        {{ loading ? 'Submitting...' : 'Submit Application' }}
      </button>
    </form>
  </div>
</div>
